name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install smoke dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch numpy scipy
      - name: Validate repository artifacts
        run: python scripts/validate_repo.py
      - name: Smoke-test model variants
        run: python scripts/smoke_model.py

